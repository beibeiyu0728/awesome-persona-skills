#此工作流会建立一个新的容器镜像，并推送到阿里云容器注册中心(ACR)，
#，然后将其部署到阿里云容器服务Kubernetes(ACK)，当有一个推送到“主”分支时。
#
#要使用此工作流，您需要完成以下设置步骤：
#
#1.创建一个ACR存储库来存储容器映像。
#您可以使用ACR EE实例来获得更高的安全性和更好的性能。
#有关说明，请参阅https://www.alibabacloud.com/help/doc-detail/142168.htm
#
#2.创建一个ACK集群来运行容器化应用程序。
#您可以使用ACK Pro集群来获得更高的安全性和更好的性能。
#有关说明，请参阅https://www.alibabacloud.com/help/doc-detail/95108.htm
#
#3.将accesskey对存储在名为"access_KEY_ID"和"access_KEY_SECRET"的GitHub操作密码中。
#有关设置密码的说明，请参阅： https://developer.github.com/actions/managing-workflows/storing-secrets/
#
#4.更改REGION_ID、REGISTRY、NAMESPACE、IMAGE、ACK_CLUSTER_ID和ACK_Deployment_NAME的值.
#

在……之上

在……之上:
推:
分支机构: [ "主要" ]

#此工作流中所有作业和步骤可用的环境变量。
env:
region_ID:CN-杭州
注册表: registry.cn-hangzhou.aliyuncs.com
命名空间: 命名空间
图像: 回购
标签: ${{github.sha}}
ACK_CLUSTER_ID: CLUSTERID
ACK_DEPLOYMENT_NAME:Nginx部署

ACR_EE_REGISTRY: myregistry.cn-hangzhou.cr.aliyuncs.com
ACR_EE_INSTANCE_ID:instanceId: instanceId
ACR_EE_NAMESPACE：命名空间: 命名空间
ACR_EE_IMAGE: ACR_EE_TAG
ACR_EE_TAG: ${{github.sha}}

权限：:
内容：已读: 读

工作:
建立:
连续的: ubuntu-最新
环境: 生产

步骤:
-姓名: 结帐
uses: 操作/结帐@v4

    #1.1登录ACR
    - 姓名: 使用accesskey对登录ACR
uses: 阿里云/acr-login@v1
和……一起:
区域ID: "${{env.REGION_ID}}"
access-key-id: "${{secrets.ACCESS_KEY_ID}}"
access-key-secret: "${{secrets.ACCESS_KEY_SECRET}}"

    #1.2构建并将映像推送到ACR
    - 姓名: 构建映像并将其推送到ACR
跑: |
Docker构建--标记“$REGISTRY/$NAMESPACE/$IMAGE：$TAG”。
Docker推送“$REGISTRY/$NAMESPACE/$IMAGE：$TAG”

    #1.3ACR中的扫描图像
    - 姓名: ACR中的扫描图像
用途：阿里云/acr扫描@v1
和……一起：
区域ID："${{env.REGION_ID}}"
access-key-id："${{secrets.ACCESS_KEY_ID}}"
access-key-secret："${{secret.Access_KEY_SECRET}}"
存储库："${{env.namespace}}/${{env.Image}}"
标签: "${{ env.TAG }}"

#2.1(可选)登录ACR EE
-使用：操作/结帐@v4
-名称：使用accesskey对登录ACR EE
用途：阿里云/acr-login@v1
和……一起：
登录服务器："https://${{env.ACR_EE_REGISTRY}}"
区域ID："${{env.REGION_ID}}"
access-key-id："${{secrets.ACCESS_KEY_ID}}”
access-key-secret："${{secret.Access_KEY_SECRET}}"
        instance-id: "${{ env.ACR_EE_INSTANCE_ID }}"

#2.2(可选)构建和推送映像ACR EE
-姓名：构建映像并将其推送到ACR EE
运行：|
Docker build-t"$ACR_EE_REGISTRY/$ACR_EE_NAMESPACE/$ACR_EE_IMAGE：$TAG"。
Docker推送“$ACR_EE_REGISTRY/$ACR_EE_NAMESPACE/$ACR_EE_IMAGE：$TAG”
#2.3(可选)在ACR EE中扫描图像
-姓名：ACR EE中的扫描图像
用途：阿里云/acr扫描@v1
和……一起：
区域ID："${{env.REGION_ID}}"
access-key-id："${{secrets.ACCESS_KEY_ID}}”
access-key-secret："${{secret.Access_KEY_SECRET}}"
        instance-id: "${{ env.ACR_EE_INSTANCE_ID }}"
        repository: "${{ env.ACR_EE_NAMESPACE}}/${{ env.ACR_EE_IMAGE }}"
标签: "${{ env.ACR_EE_TAG }}"

    # 3.1 Set ACK context
    - 姓名: Set K8s context
uses: aliyun/ack-set-context@v1
和……一起：
access-key-id："${{secrets.ACCESS_KEY_ID}}”
access-key-secret："${{secret.Access_KEY_SECRET}}"
        cluster-id: "${{ env.ACK_CLUSTER_ID }}"

    # 3.2 Deploy the image to the ACK cluster
    - name: Set up Kustomize
      run: |-
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"  | bash /dev/stdin 3.8.6
    - name: Deploy
      run: |-
        ./kustomize edit set image REGISTRY/NAMESPACE/IMAGE:TAG=$REGISTRY/$NAMESPACE/$IMAGE:$TAG
        ./kustomize build . | kubectl apply -f -
        kubectl rollout status deployment/$ACK_DEPLOYMENT_NAME
        kubectl get services -o wide
